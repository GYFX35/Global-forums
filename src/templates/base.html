<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Arts and Talents Promotion{% endblock %}</title>
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Arts and Talents Promotion">
    <meta property="og:description" content="A space for artists to showcase their work and connect with the world.">
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Arts and Talents Promotion">
    <meta property="twitter:description" content="A space for artists to showcase their work and connect with the world.">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: bold;
            color: #ffc107 !important;
        }
        .footer {
            background-color: #343a40;
            color: white;
            padding: 20px 0;
            margin-top: 40px;
        }
        #ai-chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        #ai-chat-window {
            display: none;
            width: 300px;
            height: 400px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex-direction: column;
        }
        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .chat-header {
            background: #007bff;
            color: white;
            padding: 10px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}"><i class="fas fa-palette me-2"></i>Arts & Talents</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('dance') }}">Traditional Dance</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('tourism') }}">Tourism</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('animal_husbandry') }}">Animal Husbandry</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('startups') }}">Startups</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer text-center">
        <div class="container">
            <div class="mb-3">
                <button id="share-btn" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-share-alt me-2"></i>Share this Page
                </button>
            </div>
            <p>&copy; 2023 Arts and Talents Promotion Platform. All rights reserved.</p>
        </div>
    </footer>

    <!-- AI Chat Widget -->
    <div id="ai-chat-widget">
        <div id="ai-chat-window">
            <div class="chat-header">
                <span>AI Assistant</span>
                <button type="button" class="btn-close btn-close-white" onclick="toggleChat()"></button>
            </div>
            <div id="chat-messages">
                <p><strong>AI:</strong> Hello! How can I help you today?</p>
            </div>
            <div class="p-2 border-top">
                <div class="input-group">
                    <input type="text" id="chat-input" class="form-control" placeholder="Type a message...">
                    <button class="btn btn-primary" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
        <button class="btn btn-primary rounded-circle shadow" style="width: 60px; height: 60px;" onclick="toggleChat()">
            <i class="fas fa-robot fa-2x"></i>
        </button>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Social Sharing Logic
        document.getElementById('share-btn').addEventListener('click', async () => {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: document.title,
                        text: 'Check out this awesome Arts and Talents platform!',
                        url: window.location.href,
                    });
                } catch (err) {
                    console.error('Error sharing:', err);
                }
            } else {
                // Fallback for browsers that don't support Web Share API
                const url = encodeURIComponent(window.location.href);
                const text = encodeURIComponent('Check out this awesome Arts and Talents platform!');
                const twitterUrl = `https://twitter.com/intent/tweet?url=${url}&text=${text}`;
                const facebookUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                const whatsappUrl = `https://api.whatsapp.com/send?text=${text}%20${url}`;

                // For simplicity in this fallback, we can show a simple modal or just alert with options
                // Let's create a simple Bootstrap modal for fallback
                const modalHtml = `
                    <div class="modal fade" id="shareModal" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content text-dark">
                                <div class="modal-header">
                                    <h5 class="modal-title">Share this page</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>
                                <div class="modal-body text-center">
                                    <a href="${twitterUrl}" target="_blank" class="btn btn-primary m-2"><i class="fab fa-twitter me-2"></i>Twitter</a>
                                    <a href="${facebookUrl}" target="_blank" class="btn btn-primary m-2" style="background-color: #3b5998;"><i class="fab fa-facebook-f me-2"></i>Facebook</a>
                                    <a href="${whatsappUrl}" target="_blank" class="btn btn-success m-2"><i class="fab fa-whatsapp me-2"></i>WhatsApp</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                const shareModal = new bootstrap.Modal(document.getElementById('shareModal'));
                shareModal.show();
                document.getElementById('shareModal').addEventListener('hidden.bs.modal', function () {
                    this.remove();
                });
            }
        });

        function toggleChat() {
            const window = document.getElementById('ai-chat-window');
            if (window.style.display === 'none' || window.style.display === '') {
                window.style.display = 'flex';
            } else {
                window.style.display = 'none';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const messages = document.getElementById('chat-messages');
            const text = input.value.trim();
            if (text === '') return;

            // Add user message safely
            const userMsg = document.createElement('p');
            const userStrong = document.createElement('strong');
            userStrong.textContent = 'You: ';
            userMsg.appendChild(userStrong);
            userMsg.appendChild(document.createTextNode(text));
            messages.appendChild(userMsg);
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // Call backend AI
            try {
                const response = await fetch('/ask_ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                const aiMsg = document.createElement('p');
                const aiStrong = document.createElement('strong');
                aiStrong.textContent = 'AI: ';
                aiMsg.appendChild(aiStrong);
                aiMsg.appendChild(document.createTextNode(data.response));
                messages.appendChild(aiMsg);
                messages.scrollTop = messages.scrollHeight;
            } catch (error) {
                console.error("Error:", error);
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
